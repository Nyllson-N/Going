services:
  postgres:
    image: postgres:16
    container_name: golangbackend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-golangbackend}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Volume do banco apontando para a pasta indicada.
      - "/home/ny/Área de trabalho/Projetos/Banco de dados:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-golangbackend}"]
      interval: 5s
      timeout: 5s
      retries: 5
